<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Sushi Roll</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            background-image: url(folder/ObjectsBackground.png);
            background-attachment: fixed;
            background-position: center center;
            background-repeat: repeat;
            color: #000000;
            font-size: 13px;
            line-height: 1.1875;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }
        .thanks-container {
            background-color: #fff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            padding: 40px 30px;
            text-align: center; 
            border-top: 6px solid #8e0000;
        }
        h1 {
            color: #8e0000;
            margin-bottom: 15px;
            font-size: 2rem;
        }
        .message {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .chef-image {
            border: 0px solid #000000;
            border-radius: 0px;
            padding: 0;
            width: 130px;
            height: 130px;
            margin-bottom: 15px;
        }
        .back-btn {
            display: inline-block;
            background-color: #8e0000;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: background-color 0.3s, transform 0.2s;
        }

        .back-btn:hover {
            background-color: #b30000;
            transform: translateY(-2px);
        }
        /* 📱 MOBILE RESPONSIVE DESIGN */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            /* Make the white card take up the full screen width on phones */
            .order-container, .thanks-container {
                width: 95%;
                padding: 20px 15px;
            }

            /* Stack the "Add to Cart" row vertically instead of side-by-side */
            .add-row {
                flex-direction: column;
                gap: 8px;
            }

            .add-row select, .add-row input, .add-btn {
                width: 100%;
            }

            /* Adjust heading sizes for smaller screens */
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="thanks-container">
        
        <img src="folder/logoMenu.png" alt="Sushi Chef Preparing Food" class="chef-image">

        <h1>Thank You for Your Order!</h1>
        
        <p class="message">
            Your delicious sushi is currently being hand-rolled by our master chefs. 
            It will be ready for you very soon. Arigato gozaimasu! 🍣
        </p>
        
        <a href="index.html" class="back-btn">← Back to Menu</a>
        
    </div>

</body>
</html>
