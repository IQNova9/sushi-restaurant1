<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order - Sushi Roll</title>
    <style>
        /* Exact same wavy background and font from the menu */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #fff9f9;
             background-image: url(folder/ObjectsBackground.png);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }

        .order-container {
            background-color: #fff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 550px;
            padding: 30px;
            border-top: 6px solid #8e0000;
        }

        h1 {
            color: #8e0000;
            text-align: center;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #444;
        }

        input[type="text"],
        input[type="email"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box; 
            font-size: 1rem;
            background-color: #fafafa;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #8e0000;
            background-color: #fff;
        }

        optgroup {
            font-weight: bold;
            color: #8e0000;
        }

        /* Styling for the Add to Cart section */
        .add-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .add-row select {
            flex: 2;
        }

        .add-row input {
            flex: 1;
        }

        .add-btn {
            background-color: #4CAF50; /* Green button to add items */
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .add-btn:hover {
            background-color: #45a049;
        }

        /* Cart Display Area */
        .cart-box {
            background-color: #fdfdfd;
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .cart-box h3 {
            margin-top: 0;
            color: #444;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        #cart-items {
            list-style: none;
            padding: 0;
            margin: 0 0 15px 0;
            max-height: 150px;
            overflow-y: auto;
        }

        #cart-items li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 0.95rem;
        }

        .remove-btn {
            background-color: #ff4c4c;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 3px 8px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-left: 10px;
        }

        .cart-total {
            text-align: right;
            font-size: 1.2rem;
            font-weight: bold;
            color: #8e0000;
        }

        /* Big red submit button */
        .submit-btn {
            width: 100%;
            background-color: #8e0000;
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s, transform 0.2s;
        }

        .submit-btn:hover {
            background-color: #b30000;
            transform: translateY(-2px);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #555;
            text-decoration: none;
            font-weight: bold;
        }
        /* 📱 MOBILE RESPONSIVE DESIGN */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            /* Make the white card take up the full screen width on phones */
            .order-container, .thanks-container {
                width: 95%;
                padding: 20px 15px;
            }

            /* Stack the "Add to Cart" row vertically instead of side-by-side */
            .add-row {
                flex-direction: column;
                gap: 8px;
            }

            .add-row select, .add-row input, .add-btn {
                width: 100%;
            }

            /* Adjust heading sizes for smaller screens */
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="order-container">
        <h1>Place Your Order</h1>
        <p class="subtitle">Add items to your basket and complete your order.</p>
        
        <form action="thanks.html" method="GET" id="orderForm">
            
            <div class="form-group">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" required placeholder="e.g. Ali Ahmed">
            </div>
            
            <div class="form-group">
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required placeholder="ali@example.com">
            </div>
            
            <div class="form-group">
                <label>Add Food to Basket:</label>
                <div class="add-row">
                    <select id="food-select">
                        <option value="" data-price="0" data-name="">-- Select an item --</option>
                        
                        <optgroup label="Soups">
                            <option value="soup1" data-price="9000" data-name="Pumpkin Soup">Pumpkin Soup</option>
                            <option value="soup2" data-price="9000" data-name="Miso Chicken Noodle">Miso Chicken Noodle</option>
                            <option value="soup3" data-price="13000" data-name="Seafood Sushi Roll Soup">Seafood Sushi Roll Soup</option>
                            <option value="soup4" data-price="8000" data-name="Classic Miso Soup">Classic Miso Soup</option>
                            <option value="soup5" data-price="11000" data-name="Spicy Tom Yum">Spicy Tom Yum</option>
                        </optgroup>

                        <optgroup label="Sushi Rolls">
                            <option value="roll_1" data-price="9000" data-name="Cooked salmon roll">Cooked salmon roll</option>
                            <option value="roll_2" data-price="11500" data-name="Salmon Tobiko">Salmon Tobiko</option>
                            <option value="roll_3" data-price="12000" data-name="Crazy Roll">Crazy Roll</option>
                            <option value="roll_4" data-price="13000" data-name="Tokyo Roll">Tokyo Roll</option>
                            <option value="roll_5" data-price="13500" data-name="Shrimp ball roll">Shrimp ball roll</option>
                        </optgroup>

                        <optgroup label="Fried Sushi">
                            <option value="fried_1" data-price="11500" data-name="Crunchy salmon - 6 pieces">Crunchy salmon - 6 pieces</option>
                            <option value="fried_2" data-price="13500" data-name="Crunchy Shrimp & Avocado - 6 Pieces">Crunchy Shrimp & Avocado - 6 Pieces</option>
                            <option value="fried_3" data-price="14000" data-name="Sushi Rolls - 6 pieces">Sushi Rolls - 6 pieces</option>
                            <option value="fried_4" data-price="15000" data-name="Samurai Fire Roll">Samurai Fire Roll</option>
                            <option value="fried_5" data-price="13000" data-name="Vegetarian Fried Sushi Roll">Vegetarian Fried Sushi Roll</option>
                        </optgroup>

                        <optgroup label="Main Dishes">
                            <option value="main_1" data-price="18000" data-name="Mongolian beef">Mongolian beef</option>
                            <option value="main_2" data-price="16000" data-name="Cashew dish">Cashew dish</option>
                            <option value="main_3" data-price="15000" data-name="Sweet and sour">Sweet and sour</option>
                            <option value="main_4" data-price="15000" data-name="Masala chicken">Masala chicken</option>
                            <option value="main_5" data-price="17000" data-name="Sizzling Japanese Hot Pan">Sizzling Japanese Hot Pan</option>
                        </optgroup>

                        <optgroup label="Noodles">
                            <option value="noodle_1" data-price="13000" data-name="Pad Thai with Chicken">Pad Thai with Chicken</option>
                            <option value="noodle_2" data-price="17000" data-name="Meat ramen">Meat ramen</option>
                            <option value="noodle_3" data-price="15000" data-name="Vermicelli Seafood">Vermicelli Seafood</option>
                            <option value="noodle_4" data-price="13000" data-name="Chicken vermicelli">Chicken vermicelli</option>
                            <option value="noodle_5" data-price="16000" data-name="Asian seafood noodles">Asian seafood noodles</option>
                        </optgroup>

                        <optgroup label="Kids Meals">
                            <option value="Kids_1" data-price="11000" data-name="Kids meal 1">Kids meal 1</option>
                            <option value="Kids_2" data-price="14000" data-name="kids meal 2">kids meal 2</option>
                            <option value="Kids_3" data-price="14000" data-name="kids 3">kids 3</option>
                            <option value="Kids_4" data-price="7000" data-name="chicken tenders">chicken tenders</option>
                            <option value="Kids_5" data-price="6000" data-name="French fries">French fries</option>
                        </optgroup>
                        
                        </select>
                    
                    <input type="number" id="item-qty" min="1" max="20" value="1" title="Quantity">
                    <button type="button" class="add-btn" onclick="addToCart()">Add</button>
                </div>
            </div>
            <div class="form-group">
                <label for="promo-code">Have a Promo Code?</label>
                <div class="add-row">
                    <input type="text" id="promo-code" placeholder="Try 'WELCOME10'">
                    <button type="button" class="add-btn" onclick="applyPromo()" style="background-color: #f39c12;">Apply</button>
                </div>
                <small id="promo-message" style="display: none; font-weight: bold; margin-top: 5px;"></small>
            </div>
            <div class="cart-box">
                <h3>🛒 Your Basket</h3>
                <ul id="cart-items">
                    <li style="color: #999; text-align: center;">Your basket is empty.</li>
                </ul>
                <div class="cart-total">
                    <div style="font-size: 1rem; color: #666;">Subtotal: <span id="sub-total">0</span> IQD</div>
                    <div id="discount-row" style="color: #27ae60; font-size: 1rem; display: none;">
                        Discount (10%): -<span id="discount-amount">0</span> IQD
                    </div>
                    <div><strong>Total: <span id="total-price">0</span> IQD</strong></div>
                </div>
            </div>

            <input type="hidden" id="final-cart-data" name="cart_data" required>

            <button type="submit" class="submit-btn">Complete Order</button>
        </form>
        
        <a href="index.html" class="back-link">← Back to Menu</a>
    </div>

    <script>
        let cart = [];
        let discountMultiplier = 1; 
        let promoApplied = false;

        function addToCart() {
            const select = document.getElementById('food-select');
            const qtyInput = document.getElementById('item-qty');
            const selectedOption = select.options[select.selectedIndex];
            
            const id = selectedOption.value;
            const name = selectedOption.getAttribute('data-name');
            const price = parseInt(selectedOption.getAttribute('data-price'));
            const qty = parseInt(qtyInput.value);

            if (!id) {
                alert("Please select a food item first!");
                return;
            }

            const existingItem = cart.find(item => item.id === id);
            if (existingItem) {
                existingItem.qty += qty;
            } else {
                cart.push({ id, name, price, qty });
            }

            select.value = "";
            qtyInput.value = 1;
            updateCartUI();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

      
        function applyPromo() {
            const codeInput = document.getElementById('promo-code').value.trim().toUpperCase();
            const msg = document.getElementById('promo-message');
            
            if (codeInput === 'WELCOME10' && !promoApplied) {
                discountMultiplier = 0.9; 
                promoApplied = true;
                
                msg.style.display = 'block';
                msg.style.color = '#27ae60'; 
                msg.innerText = 'Success! 10% First Order Discount Applied.';
                
                updateCartUI(); 
            } else if (promoApplied) {
                msg.style.display = 'block';
                msg.style.color = '#f39c12'; 
                msg.innerText = 'Promo code already applied!';
            } else {
                msg.style.display = 'block';
                msg.style.color = '#c0392b'; 
                msg.innerText = 'Invalid promo code.';
            }
        }

        function updateCartUI() {
            const cartList = document.getElementById('cart-items');
            const subTotalSpan = document.getElementById('sub-total');
            const discountRow = document.getElementById('discount-row');
            const discountAmountSpan = document.getElementById('discount-amount');
            const totalPriceSpan = document.getElementById('total-price');
            const hiddenInput = document.getElementById('final-cart-data');

            cartList.innerHTML = ""; 
            let subTotal = 0;

            if (cart.length === 0) {
                cartList.innerHTML = '<li style="color: #999; text-align: center;">Your basket is empty.</li>';
                hiddenInput.value = ""; 
            } else {
                cart.forEach((item, index) => {
                    const itemTotal = item.price * item.qty;
                    subTotal += itemTotal;

                    const li = document.createElement('li');
                    li.innerHTML = `
                        <span>${item.qty}x <strong>${item.name}</strong></span>
                        <span>
                            ${itemTotal.toLocaleString()} IQD 
                            <button type="button" class="remove-btn" onclick="removeFromCart(${index})">X</button>
                        </span>
                    `;
                    cartList.appendChild(li);
                });
                hiddenInput.value = JSON.stringify(cart);
            }

         
            let finalTotal = subTotal;
            let discountAmount = 0;

            if (promoApplied) {
                discountAmount = subTotal * 0.10; 
                finalTotal = subTotal - discountAmount;
                discountRow.style.display = 'block'; 
            } else {
                discountRow.style.display = 'none'; 
            }

         
            subTotalSpan.innerText = subTotal.toLocaleString();
            discountAmountSpan.innerText = discountAmount.toLocaleString();
            totalPriceSpan.innerText = finalTotal.toLocaleString();
        }

        document.getElementById('orderForm').addEventListener('submit', function(e) {
            if (cart.length === 0) {
                e.preventDefault(); 
                alert("Please add at least one item to your basket before ordering!");
            }
        });
    </script>

</body>
</html>
